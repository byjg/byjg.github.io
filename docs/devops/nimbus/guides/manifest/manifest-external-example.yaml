    #         matchLabels:
    #           app: my-app
    #       template:
    #         metadata:
    #           labels:
    #             app: my-app
    #         spec:
    #           containers:
    #             - name: app
    #               image: nginx:latest

compute:
  web-app:
    swarm: prod
    image: byjg/static-httpserver
    type: small
    replicas: 1
    # domain: app.example.com
    ports:
      - "80:8080"
    volumes:
      - vol2:/data
    env:
      - TITLE=soon
      - "MESSAGE=Keep In Touch"
    # command: ["nginx", "-g", "daemon off;"]

