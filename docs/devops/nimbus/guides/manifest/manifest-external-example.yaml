# DockNimbus Manifest Example — External Resources
#
# This manifest references existing nodes, volumes, swarms, and K8s clusters
# instead of creating them. Only compute instances and S3 are managed by this manifest.
#
# Apply:  nimbus manifest apply --file manifest-external-example.yaml --env S3_PASSWORD=secret
# Remove: nimbus manifest remove --file manifest-external-example.yaml
#
# Variable substitution: ${VAR} is replaced from --env flags and OS environment.

name: my-infrastructure

nodes:
  web1:
    external: true

  web2:
    external: true

volumes:
  vol1:
    external: true

  vol2:
    node: web1
    folder: /srv/nimbus/vol2

swarms:
  prod:
    external: true

s3:
  store1:
    swarm: prod
    volume: vol1
    password: ${S3_PASSWORD}
    # license: /path/to/license
    # certs: /path/to/certs.pem

kubernetes:
  cluster1:
    external: true
    # manifests:
    #   - apiVersion: apps/v1
    #     kind: Deployment
    #     metadata:
    #       name: my-app
    #     spec:
    #       replicas: 1
